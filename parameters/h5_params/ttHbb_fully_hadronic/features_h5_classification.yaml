#description: "Features for jet assignment in ttHbb fully hadronic channel"
input:
  Jet: [pt, eta, phi, btag, btag_L, btag_M, btag_T, btag_CvL, btag_CvB, btag_QvG, btag_XT, btag_XXT]
  Met: [pt, phi, m, eta]
  Event: [ht] # we only have the 'weight' column in the event tree, not the 'ht' column?? 

collection:
  Jet: JetGood
  Met: MET

particles: [t1, t2, h]

mapping_sample:
  TTH_Hto2B: signal
  QCD: qcd

classification:
  EVENT:
    - signal

test_size: 0.2
