#description: "Features for classification in ttHbb fully hadronic channel"
input:
  # MASK required by SPANet JetReconstructionDataset (see INPUTS/Jet/MASK); derived from pt in parquet_to_h5
  Jet: [MASK, pt, eta, phi, btag, btag_L, btag_M, btag_T, btag_CvL, btag_CvB, btag_QvG, btag_XT, btag_XXT]
  Met: [pt, phi, m, eta]
  Event: [ht] 

collection:
  Jet: JetGood
  Met: MET

particles: [t1, t2, h]

mapping_sample:
  TTH_Hto2B: signal
  QCD: qcd

classification:
  EVENT:
    - signal23

test_size: 0.2
